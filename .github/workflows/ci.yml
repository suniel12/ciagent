name: CIAgent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-hygiene:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Fail on AI co-author trailers in commit messages
      run: |
        bad=$(git log --all -i -E --grep='co-authored-by:.*(claude|anthropic)' --format='%h %s')
        if [ -n "$bad" ]; then
          echo "AI co-author trailer found in commit message(s):"
          echo "$bad"
          echo "Amend or rebase to drop the Co-Authored-By trailer."
          exit 1
        fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all,dev]"
    - name: Run tests
      run: |
        pytest

    - name: Verify CLI (Demo Agent)
      run: |
        # Install the package in editable mode
        pip install -e .
        
        # Run the demo agent tests
        # We need to set PYTHONPATH so the agent code can be imported
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        ciagent run --suite examples/demo_agent/agentci.yaml --ci

name: CIAgent Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agentci-deterministic:
    name: Deterministic Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .

      - name: Run deterministic CIAgent tests
        run: |
          pytest tests/ -v -m "not live" \
            --tb=short \
            2>&1 | tee ciagent-test-results.txt
        env:
          ANTHROPIC_API_KEY: sk-ant-dummy-key-for-testing

      - name: Upload deterministic test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ciagent-results-deterministic
          path: ciagent-test-results.txt
          retention-days: 14

  agentci-llm-judge:
    name: LLM-as-Judge Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .

      - name: Run LLM-as-judge tests
        if: env.ANTHROPIC_API_KEY != ''
        run: |
          pytest tests/ -v \
            --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: false
